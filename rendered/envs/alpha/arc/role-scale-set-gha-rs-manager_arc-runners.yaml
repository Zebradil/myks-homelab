apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  annotations:
    a8r.io/repository: https://github.com/Zebradil/myks-homelab
  finalizers:
    - actions.github.com/cleanup-protection
  labels:
    actions.github.com/scale-set-name: scale-set
    actions.github.com/scale-set-namespace: arc-runners
    app.kubernetes.io/component: manager-role
    app.kubernetes.io/instance: scale-set
    app.kubernetes.io/name: scale-set
    app.kubernetes.io/part-of: gha-rs
  name: scale-set-gha-rs-manager
  namespace: arc-runners
rules:
  - apiGroups:
      - ""
    resources:
      - pods
    verbs:
      - create
      - delete
      - get
  - apiGroups:
      - ""
    resources:
      - pods/status
    verbs:
      - get
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
  - apiGroups:
      - ""
    resources:
      - serviceaccounts
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
  - apiGroups:
      - rbac.authorization.k8s.io
    resources:
      - rolebindings
    verbs:
      - create
      - delete
      - get
      - patch
      - update
  - apiGroups:
      - rbac.authorization.k8s.io
    resources:
      - roles
    verbs:
      - create
      - delete
      - get
      - patch
      - update
