apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    a8r.io/repository: https://github.com/Zebradil/myks-homelab
  name: httpbingo
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: httpbingo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: httpbingo
    spec:
      containers:
        - image: index.docker.io/mccutchen/go-httpbin@sha256:b5d2ef3378e61138998cb4e60edf117000594f33b9be504825921190a7109e69
          name: httpbingo
          ports:
            - containerPort: 8080
              name: http
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - all
            privileged: false
