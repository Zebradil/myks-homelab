apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    a8r.io/repository: https://github.com/Zebradil/myks-homelab
  name: httpbingo
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: httpbingo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: httpbingo
    spec:
      containers:
        - image: index.docker.io/mccutchen/go-httpbin@sha256:c0bf25bcde7329ba1d07aa372bc1f6ad33608ab1a8b40870769b9d99aa466c5c
          name: httpbingo
          ports:
            - containerPort: 8080
              name: http
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - all
            privileged: false
