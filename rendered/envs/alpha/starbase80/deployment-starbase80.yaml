apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    a8r.io/repository: https://github.com/Zebradil/myks-homelab
  name: starbase80
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: starbase80
  template:
    metadata:
      annotations:
        checksum/config: 7c875f1009000365f8e5934c45345b54
      labels:
        app.kubernetes.io/name: starbase80
    spec:
      containers:
        - image: index.docker.io/library/nginx@sha256:5a88c9c45479443d7be2eadc894b4ed0a9801bae03d97a5760ae13b5c2005942
          name: server
          ports:
            - containerPort: 80
              name: http
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              add:
                - NET_BIND_SERVICE
                - CHOWN
                - SETGID
                - SETUID
              drop:
                - all
            privileged: false
          volumeMounts:
            - mountPath: /usr/share/nginx/html
              name: static
              readOnly: true
      initContainers:
        - args:
            - sh
            - -c
            - |
              npm run build
              cp -vr public/. /static/
          env:
            - name: TITLE
              value: ""
          image: index.docker.io/jordanroher/starbase-80@sha256:6eb898bfa3ad2d38aca9e1e5597b3b1046112deb35c194887942a421fa822991
          name: builder
          volumeMounts:
            - mountPath: /static
              name: static
            - mountPath: /app/src/config/config.json
              name: config
              readOnly: true
              subPath: config.json
      volumes:
        - emptyDir: {}
          name: static
        - configMap:
            name: config
          name: config
