apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    a8r.io/repository: https://github.com/Zebradil/myks-homelab
  name: librespeed
spec:
  selector:
    matchLabels:
      app: librespeed
  template:
    metadata:
      labels:
        app: librespeed
    spec:
      containers:
        - env:
            - name: PASSWORD
              valueFrom:
                secretKeyRef:
                  key: password
                  name: librespeed
          image: index.docker.io/linuxserver/librespeed@sha256:ceeb3439fc2ac5dcebe9f78ec34eaf5f8f0d86cb86713462d32b0f09bcc3803a
          name: librespeed
          ports:
            - containerPort: 80
              name: http
