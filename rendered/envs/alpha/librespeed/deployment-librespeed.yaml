apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    a8r.io/repository: https://github.com/Zebradil/myks-homelab
  name: librespeed
spec:
  selector:
    matchLabels:
      app: librespeed
  template:
    metadata:
      labels:
        app: librespeed
    spec:
      containers:
        - env:
            - name: PASSWORD
              valueFrom:
                secretKeyRef:
                  key: password
                  name: librespeed
          image: index.docker.io/linuxserver/librespeed@sha256:110df57cd248672c98fd3e6758314ad36755c28620e231a04bddc7c835c19a09
          name: librespeed
          ports:
            - containerPort: 80
              name: http
