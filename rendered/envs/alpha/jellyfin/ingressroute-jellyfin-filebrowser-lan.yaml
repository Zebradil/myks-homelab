apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  annotations:
    a8r.io/repository: https://github.com/Zebradil/myks-homelab
  name: jellyfin-filebrowser-lan
spec:
  entryPoints:
    - lan-web
    - lan-websecure
  routes:
    - kind: Rule
      match: Host(`jellyfin-filebrowser.lan.zebradil.dev`) || Host(`jellyfin-filebrowser.junior.lan.zebradil.dev`) || Host(`jellyfin-filebrowser.zebradil.dev`) || Host(`jellyfin-filebrowser.junior.zebradil.dev`)
      services:
        - name: jellyfin-filebrowser
          port: http
