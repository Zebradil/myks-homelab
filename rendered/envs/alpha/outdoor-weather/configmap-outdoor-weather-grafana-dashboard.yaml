      "refresh": "5m",
      "schemaVersion": 42,
      "tags": [
        "airgradient",
        "outdoor",
        "weather"
      ],
      "templating": {
        "list": [
          {
            "allValue": ".*",
            "allowCustomValue": true,
            "auto": false,
            "auto_count": 30,
            "auto_min": "10s",
            "datasource": {
              "type": "prometheus"
            },
            "includeAll": true,
            "multi": true,
            "name": "serialno",
            "query": "label_values(airgradient_config_info,serialno)",
            "refresh": 1,
            "skipUrlSync": false,
            "sort": 1,
            "type": "query"
          }
        ]
      },
      "time": {
        "from": "now-90d",
        "to": "now"
