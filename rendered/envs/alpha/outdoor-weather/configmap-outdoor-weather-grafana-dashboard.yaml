apiVersion: v1
data:
  outdoor-weather-dashboard.json: |-
    {
      "annotations": {},
      "description": "Compares AirGradient indoor air quality against outdoor weather (Open-Meteo) and air quality (UBA).",
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "panels": [
        {
          "datasource": {
            "type": "prometheus"
          },
          "description": "Indoor AirGradient ambient temperature vs outdoor temperature at the configured coordinates (Open-Meteo).",
          "fieldConfig": {
            "defaults": {
              "custom": {
                "fillOpacity": 10,
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "showPoints": "never",
                "spanNulls": true
              },
              "unit": "celsius"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 9,
            "w": 12,
            "x": 0,
            "y": 0
          },
          "options": {
            "legend": {
              "calcs": [
                "lastNotNull",
                "min",
                "max",
                "mean"
              ],
              "displayMode": "table",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "repeatDirection": "h",
          "targets": [
            {
              "editorMode": "code",
              "expr": "avg by(serialno) (airgradient_atmp{serialno=~\"$serialno\"})",
              "legendFormat": "Indoor {{serialno}}"
            },
            {
              "editorMode": "code",
              "expr": "avg (outdoor_temp_celsius)",
              "legendFormat": "Outdoor"
            }
          ],
          "title": "Temperature — Indoor vs Outdoor",
          "transparent": false,
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "prometheus"
          },
          "description": "Indoor vs outdoor relative humidity.",
          "fieldConfig": {
            "defaults": {
              "custom": {
                "fillOpacity": 10,
                "lineInterpolation": "smooth",
