apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    a8r.io/repository: https://github.com/Zebradil/myks-homelab
  name: cams
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: cams
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cams
    spec:
      containers:
        - image: oci.zebradil.dev/zebradil/homelab/maks-cams/caddy@sha256:20d8a8b8e68fefa6a38f1891228c84469289b5f17316629183b473c8124a2d8b
          name: caddy
          ports:
            - containerPort: 8080
              name: http
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              add:
                - net_bind_service
              drop:
                - all
            privileged: false
            readOnlyRootFilesystem: true
            runAsGroup: 1001
            runAsUser: 1001
          volumeMounts:
            - mountPath: /config
              name: caddy-data
            - mountPath: /data
              name: caddy-data
            - mountPath: /srv/config
              name: cameras-config
      volumes:
        - emptyDir: {}
          name: caddy-data
        - configMap:
            name: cams-cameras
          name: cameras-config
