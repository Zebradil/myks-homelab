apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    a8r.io/repository: https://github.com/Zebradil/myks-homelab
  name: kasha
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kasha
  strategy:
    rollingUpdate: null
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kasha
    spec:
      containers:
        - env:
            - name: KASHA_DATA_ROOT
              value: /kasha
            - name: KASHA_PORT
              value: "5000"
            - name: KASHA_TRUSTED_PUBLIC_KEYS
              value: znix.zebradil.dev:nvr0OQFRddbHGopQbyLbLXQnntFBDKp23tqQq+msppw=
            - name: KASHA_MIRROR_DOWN_ENABLE
              value: "1"
            - name: KASHA_REMOTE
              value: ref+sops://static/0.sops.yaml#/cache-s3-url+
            - name: KASHA_FLAKES
              value: znix
            - name: KASHA_MIRROR_DOWN_INTERVAL
              value: "300"
          envFrom:
            - secretRef:
                name: kasha
          image: oci.zebradil.dev/ghcr.io-cache/zebradil/kasha-box@sha256:b4817f10ff4d521391cf55cf1dc922c257592e072ee44680a562e895a0cff714
          livenessProbe:
            httpGet:
              path: /nix-cache-info
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          name: kasha
          ports:
            - containerPort: 5000
              name: http
          readinessProbe:
            httpGet:
              path: /nix-cache-info
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              memory: 1Gi
            requests:
              cpu: 100m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - all
          volumeMounts:
            - mountPath: /kasha
              name: kasha
      volumes:
        - name: kasha
          persistentVolumeClaim:
            claimName: kasha
