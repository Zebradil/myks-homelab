apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  annotations:
    a8r.io/repository: https://github.com/Zebradil/myks-homelab
  name: karma-lan
spec:
  entryPoints:
    - lan-web
    - lan-websecure
  routes:
    - kind: Rule
      match: Host(`karma.lan.zebradil.dev`) || Host(`karma.gray.lan.zebradil.dev`) || Host(`karma.junior.lan.zebradil.dev`)
      services:
        - name: karma
          port: http
