apiVersion: v1
data:
  karma.yaml: |
    alertmanager:
      interval: 1m
      servers:
      - name: default
        uri: http://vmalertmanager-vmks.vmks.svc.cluster.local
        timeout: 20s
        proxy: true
    listen:
      address: 0.0.0.0
      port: 8080
kind: ConfigMap
metadata:
  annotations:
    a8r.io/repository: https://github.com/Zebradil/myks-homelab
  name: config
  namespace: karma
