apiVersion: operator.victoriametrics.com/v1beta1
kind: VMNodeScrape
metadata:
  annotations:
    a8r.io/repository: https://github.com/Zebradil/myks-homelab
  name: kube-etcd
spec:
  path: /metrics
  port: "2381"
  relabelConfigs:
    - replacement: kube-etcd
      targetLabel: job
  scheme: http
  selector:
    matchLabels:
      node-role.kubernetes.io/master: "true"
