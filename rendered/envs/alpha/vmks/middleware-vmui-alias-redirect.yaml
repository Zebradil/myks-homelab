apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  annotations:
    a8r.io/repository: https://github.com/Zebradil/myks-homelab
  name: vmui-alias-redirect
spec:
  redirectRegex:
    permanent: true
    regex: ^https?://vmui\.([^/]+)(/.*)?$
    replacement: https://vmselect.${1}/select/0/vmui/
