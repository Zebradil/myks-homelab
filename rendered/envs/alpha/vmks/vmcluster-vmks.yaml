apiVersion: operator.victoriametrics.com/v1beta1
kind: VMCluster
metadata:
  annotations:
    a8r.io/repository: https://github.com/Zebradil/myks-homelab
  labels:
    app.kubernetes.io/component: victoria-metrics-k8s-stack-vmcluster
    app.kubernetes.io/instance: vmks
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: victoria-metrics-k8s-stack
    app.kubernetes.io/version: v1.133.0
    helm.sh/chart: victoria-metrics-k8s-stack-0.67.0
  name: vmks
  namespace: vmks
spec:
  clusterVersion: v1.133.0-cluster
  license: {}
  replicationFactor: 1
  retentionPeriod: 30d
  vminsert:
    extraArgs: {}
    port: "8480"
    replicaCount: 1
    resources: {}
  vmstorage:
    replicaCount: 1
    resources: {}
    storage:
      volumeClaimTemplate:
        spec:
          resources:
            requests:
              storage: 10Gi
    storageDataPath: /vm-data
