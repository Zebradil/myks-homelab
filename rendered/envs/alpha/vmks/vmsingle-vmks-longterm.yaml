apiVersion: operator.victoriametrics.com/v1beta1
kind: VMSingle
metadata:
  annotations:
    a8r.io/repository: https://github.com/Zebradil/myks-homelab
  name: vmks-longterm
  namespace: vmks
spec:
  extraArgs:
    dedup.minScrapeInterval: 5m
    vmalert.proxyURL: http://vmalert-vmks.vmks.svc.cluster.local.:8080
  image:
    tag: v1.133.0
  port: "8428"
  replicaCount: 1
  retentionPeriod: "60"
  storage:
    accessModes:
      - ReadWriteOnce
    resources:
      requests:
        storage: 10Gi
