apiVersion: operator.victoriametrics.com/v1beta1
kind: VMCluster
metadata:
  annotations:
    a8r.io/repository: https://github.com/Zebradil/myks-homelab
  labels:
    app.kubernetes.io/component: victoria-metrics-k8s-stack-vmcluster
    app.kubernetes.io/instance: vmks
    app.kubernetes.io/name: victoria-metrics-k8s-stack
  name: vmks-long
  namespace: vmks
spec:
  clusterVersion: v1.133.0-cluster
  license: {}
  replicationFactor: 1
  retentionPeriod: 5y
  vminsert:
    extraArgs: {}
    port: "8480"
    replicaCount: 1
    resources: {}
  vmselect:
    extraArgs:
      storageNode: vmstorage-vmks-0.vmstorage-vmks.vmks.svc.cluster.local.:8401,vmstorage-vmks-long-0.vmstorage-vmks-long.vmks.svc.cluster.local.:8401
    replicaCount: 1
    storage:
      volumeClaimTemplate:
        spec:
          resources:
            requests:
              storage: 2Gi
  vmstorage:
    replicaCount: 1
    resources: {}
    storage:
      volumeClaimTemplate:
        spec:
          resources:
            requests:
              storage: 10Gi
    storageDataPath: /vm-data
