#@ load("@ytt:data", "data")

#@ d = data.values
#@ name = d.myks.context.app
#@ t = d.environment.traefik

#@ def host_matches(hosts):
#@   ms = []
#@   for h in hosts:
#@     ms.append("Host(`{}.{}`)".format(name, h))
#@   end
#@   return "(" + " || ".join(ms) + ")"
#@ end

#! claude.ai cannot pass an Authelia interstitial, so this route is deliberately
#! UNAUTHENTICATED (no chain-authelia-auth middleware) and limited to the MCP
#! transport + the OAuth protected-resource metadata. /healthz, /readyz and
#! /metrics stay off the public edge (reachable only via the Service).
#@ path_match = "(PathPrefix(`/mcp`) || Path(`/.well-known/oauth-protected-resource`))"
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: #@ name
spec:
  entryPoints:
    - web
    - websecure
  routes:
    - kind: Rule
      match: #@ host_matches(t.hosts.web) + " && " + path_match
      services:
        - name: #@ name
          port: http
