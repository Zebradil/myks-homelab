#@ load("@ytt:data", "data")

#@ d = data.values
#@ a = d.application.kbmcp
#@ e = d.environment
#@ m = d.myks
#@ name = m.context.app

#@ host = name + "." + e.hosts[0]
#@ audience = "https://" + host + "/mcp"

#@ pod_labels = {"app.kubernetes.io/name": name}

#! The deploy key + known_hosts are copied out of the read-only Secret mount
#! into the state PVC so ssh sees a 0600 key owned by uid 65532 (ssh refuses
#! group/other-readable keys). Re-copying on every start picks up rotation.
#@ git_ssh_command = "ssh -i /data/state/git-key -o StrictHostKeyChecking=yes" + \
#@   " -o UserKnownHostsFile=/data/state/known_hosts"

#@ common_envs = {
#@   "HOME": "/data/state",
#@   "GIT_SSH_COMMAND": git_ssh_command,
#@   "KBMCP_GIT__BRANCH": a.branch,
#@   "KBMCP_KB_PATH": "/data/know",
#@   "KBMCP_AUTH_DB_PATH": "/data/state/auth.sqlite",
#@   "KBMCP_INDEX_DB_PATH": "/data/state/index.sqlite",
#@ }

#@ init_envs = {"KBMCP_GIT__CLONE_URL": a.kbRepo} | common_envs
#@ main_envs = {
#@   "KBMCP_WATCH": "false",
#@   "KBMCP_LISTEN": "0.0.0.0:8080",
#@   "KBMCP_LOG_FORMAT": "json",
#@   "KBMCP_GIT__AUTO_PUSH": "true",
#@   "KBMCP_GIT__AUTO_PULL__ENABLED": "true",
#@   "KBMCP_GIT__AUTO_PULL__STRATEGY": "rebase",
#@   "KBMCP_GIT__REMOTE": "origin",
#@   "KBMCP_OAUTH__ENABLED": "true",
#@   "KBMCP_OAUTH__ISSUER": a.oauth.issuer,
#@   "KBMCP_OAUTH__AUDIENCE": audience,
#@   "KBMCP_OAUTH__JWKS_URI": a.oauth.jwksUri,
#@ } | common_envs

#@ build_envs = lambda x: [{"name": k, "value": v} for k, v in x.items()]

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: know
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: #@ a.storage.know
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: state
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: #@ a.storage.state
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: #@ name
spec:
  replicas: 1
  selector:
    matchLabels: #@ pod_labels
  strategy:
    #! Recreate: RWO PVCs can't be mounted by an old and a new pod at once
    #! during a rollout, so tear down the old pod before starting the new one.
    type: Recreate
    rollingUpdate: null
  template:
    metadata:
      labels: #@ pod_labels
    spec:
      securityContext:
        runAsUser: 65532
        runAsGroup: 65532
        runAsNonRoot: true
        fsGroup: 65532
      initContainers:
        - name: init
          image: #@ a.image
          command: ['/bin/sh', '-c']
          args:
            - |
              set -eu
              cp /secrets/git-key /data/state/git-key
              chmod 600 /data/state/git-key
              cp /secrets/known_hosts /data/state/known_hosts
              chmod 644 /data/state/known_hosts
              #! Sentinel gates the whole bootstrap, written only after clone AND
              #! kb-mcp init both succeed. If init dies after a successful clone,
              #! the sentinel is absent so the next start retries init (clone is
              #! re-skipped because .git already exists).
              if [ ! -e /data/state/.kb-initialized ]; then
                if [ ! -e /data/know/.git ]; then
                  echo "KB checkout empty, cloning ${KBMCP_GIT__CLONE_URL}"
                  git clone "${KBMCP_GIT__CLONE_URL}" /data/know
                  #! Pin the working tree to the push branch regardless of the
                  #! remote default (KBMCP_GIT__AUTO_PUSH targets KBMCP_GIT__BRANCH).
                  git -C /data/know checkout -B "${KBMCP_GIT__BRANCH}"
                fi
                kb-mcp init
                touch /data/state/.kb-initialized
              fi
          env: #@ build_envs(init_envs)
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 256Mi
          volumeMounts:
            - name: know
              mountPath: /data/know
            - name: state
              mountPath: /data/state
            - name: git-secret
              mountPath: /secrets
              readOnly: true
      containers:
        - name: #@ name
          image: #@ a.image
          env: #@ build_envs(main_envs)
          ports:
            - containerPort: 8080
              name: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - all
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
          volumeMounts:
            - name: know
              mountPath: /data/know
            - name: state
              mountPath: /data/state
      volumes:
        - name: know
          persistentVolumeClaim:
            claimName: know
        - name: state
          persistentVolumeClaim:
            claimName: state
        - name: git-secret
          secret:
            secretName: kb-mcp-git
            #! Private deploy key; init copies it to the state PVC at 0600. Mount
            #! files are owned root:fsGroup(65532), so 0440 lets the non-root pod
            #! read via its fsGroup without exposing the key to "other".
            defaultMode: 0440
---
apiVersion: v1
kind: Service
metadata:
  name: #@ name
spec:
  selector: #@ pod_labels
  ports:
    - name: http
      port: 80
      targetPort: http
