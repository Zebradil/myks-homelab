#@ load("/overlay-matchers.star", m="matchers")

#@ node_scrapes = [
#@   ("kube-controller-manager", "10257", "https"),
#@   ("kube-scheduler", "10259", "https"),
#@   ("kube-etcd", "2381", "http"),
#@ ]

#@ for name, port, scheme in node_scrapes:
---
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMNodeScrape
metadata:
  name: #@ name
spec:
  scheme: #@ scheme
  #@ if scheme == "https":
  tlsConfig:
    insecureSkipVerify: true
  bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
  #@ end
  port: #@ port
  path: /metrics
  selector:
    matchLabels:
      node-role.kubernetes.io/master: 'true'
  relabelConfigs:
    - targetLabel: job
      replacement: #@ name


#@overlay/match by=m.kind_name("VMServiceScrape", "vmks-" + name)
#@overlay/remove
---
#@ end
