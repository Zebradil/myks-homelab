---
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMSingle
metadata:
  name: vmks-longterm
  namespace: vmks
spec:
  retentionPeriod: "60"
  port: "8428"
  replicaCount: 1
  extraArgs:
    dedup.minScrapeInterval: "5m"
    vmalert.proxyURL: http://vmalert-vmks.vmks.svc.cluster.local.:8080
  image:
    tag: v1.133.0
  storage:
    accessModes:
      - ReadWriteOnce
    resources:
      requests:
        storage: 10Gi
