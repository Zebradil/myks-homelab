#@ load("@ytt:data", "data")
#@ load("secrets.star", "sops")

#@ d = data.values
#@ host = d.environment.hosts[0]
---
ingress:
  enabled: true

  traefikCRD:
    enabled: true
    disableIngressRoute: true

  tls:
    enabled: false

pod:
  kind: Deployment
  replicas: 1
  strategy:
    type: Recreate

configMap:
  theme: auto
  authentication_backend:
    file:
      enabled: true
      watch: true

  session:
    cookies:
      - domain: #@ host
        subdomain: auth

  storage:
    local:
      enabled: true

  totp:
    issuer: #@ host

  notifier:
    smtp:
      address: submissions://smtp.gmail.com:465
      enabled: true
      username: #@ sops("smtp", "username")
      #! NOTE: this has no effect as GMail replaces the sender with the authenticated user.
      sender: #@ "authelia@mail." + host

  identity_providers:
    oidc:
      enabled: true
      #! Token lifespans. Without this, Authelia defaults refresh_token to 90m,
      #! which drops the claude.ai connector after short idle gaps (must re-consent).
      #! Long refresh_token = connector survives long idle periods; tokens rotate
      #! on each use so active sessions stay fresh.
      lifespans:
        access_token: 1h
        refresh_token: 90d
        id_token: 1h
      jwks:
        - key_id: default
          algorithm: RS256
          key:
            #! See ytt/secret.ytt.yaml for how this secret is injected.
            path: /secrets/internal/oidc.jwks.default.key
      clients:
        - client_id: #@ sops("oidc", "harbor.client_id")
          client_name: Harbor
          #! The chart has a validation preventing usage of a placeholder here.
          client_secret: $pbkdf2-sha512$310000$9DHdvTgaGh3aUcHDMrgAaQ$GGR6taK64IoVw9.xRAtGA1fPfZKvJguYcFlNuiwn1py0ug.A2csjIiqanEBFSO4D.fGGm7KttN.6lc/ngc3wYg
          pre_configured_consent_duration: 1y
          public: false
          authorization_policy: two_factor
          require_pkce: false
          pkce_challenge_method: ""
          redirect_uris:
            - https://oci.zebradil.dev/c/oidc/callback
          scopes:
            - openid
            - offline_access
            - profile
            - groups
            - email
          response_types:
            - code
          grant_types:
            - authorization_code
            - refresh_token
          access_token_signed_response_alg: none
          userinfo_signed_response_alg: none
          token_endpoint_auth_method: client_secret_post

        - client_id: #@ sops("oidc", "argocd.client_id")
          client_name: "Argo CD"
          #! The chart has a validation preventing usage of a placeholder here.
          client_secret: $pbkdf2-sha512$310000$fHljICwmWYJUU1clgDqrqg$X2z6OFvOd2PTz.O3aDD1EdXZsZW/2u1./.r1DlUG7Rcel/rya3HoKuopX3JFW002/oEn8jIn.hEhpCeQyuDfwg
          pre_configured_consent_duration: 1y
          public: false
          authorization_policy: two_factor
          require_pkce: false
          redirect_uris:
            - https://argocd.zebradil.dev/auth/callback
          scopes:
            - openid
            - groups
            - email
          response_types:
            - code
          grant_types:
            - authorization_code
          access_token_signed_response_alg: none
          userinfo_signed_response_alg: none
          token_endpoint_auth_method: client_secret_basic
        - client_id: #@ sops("oidc", "argocd-cli.client_id")
          client_name: Argo CD (CLI)
          pre_configured_consent_duration: 1y
          public: true
          authorization_policy: two_factor
          require_pkce: true
          pkce_challenge_method: S256
          redirect_uris:
            - http://localhost:8085/auth/callback
          scopes:
            - openid
            - offline_access
            - groups
            - email
          response_types:
            - code
          grant_types:
            - authorization_code
            - refresh_token
          access_token_signed_response_alg: none
          userinfo_signed_response_alg: none
          token_endpoint_auth_method: none

        #! Static public client for the kb-mcp server, consumed by claude.ai
        #! Custom Connectors. claude.ai does not require Dynamic Client
        #! Registration: the client_id below is entered manually in the
        #! connector's "Advanced settings". Public client (no secret) + PKCE.
        - client_id: kb-mcp
          client_name: kb-mcp
          pre_configured_consent_duration: 1y
          public: true
          authorization_policy: two_factor
          require_pkce: true
          pkce_challenge_method: S256
          token_endpoint_auth_method: none
          redirect_uris:
            - https://claude.ai/api/mcp/auth_callback
            #! Future-proofing: Anthropic is migrating the callback host.
            - https://claude.com/api/mcp/auth_callback
            #! opencode client
            - http://127.0.0.1:19876/mcp/oauth/callback
          #! RFC 8707: claude.ai sends resource=<audience>; Authelia stamps it
          #! into the access token aud. "explicit" = only granted when requested.
          audience:
            - https://kb-mcp.zebradil.dev/mcp
          requested_audience_mode: explicit
          scopes:
            - openid
            - offline_access
            - profile
            - email
            - groups
            - kb:read
            - kb:write
            - kb:admin
          response_types:
            - code
          grant_types:
            - authorization_code
            - refresh_token
          #! CRITICAL: RS256 makes Authelia emit a JWT access token (RFC 9068)
          #! that the MCP server validates via JWKS. Default "none" = opaque.
          access_token_signed_response_alg: RS256
          userinfo_signed_response_alg: none

      #! Custom OAuth scopes requested by the kb-mcp client. They carry no extra
      #! claims; they only need to exist globally to be grantable to the client.
      scopes:
        "kb:read":
          claims: []
        "kb:write":
          claims: []
        "kb:admin":
          claims: []

  access_control:
    default_policy: deny
    rules:
      - domain: #@ "*." + host
        subject:
          - group:dev
          - group:admins
        policy: two_factor

secret:
  existingSecret: authelia

#! For the "file" authentication backend.
persistence:
  enabled: true
  #! Minimum size with synology-csi is 1Gi.
  size: 1Gi
