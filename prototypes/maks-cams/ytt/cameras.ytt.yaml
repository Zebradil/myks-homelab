#@ load("@ytt:data", "data")
#@ load("@ytt:json", "json")
#@ load("traefik.lib.yaml", "route")

#@ name = data.values.myks.context.app

#@ cams = {
#@   "cam1": {"ip": "192.168.0.201", "label": "Camera 1"},
#@   "cam2": {"ip": "192.168.0.202", "label": "Camera 2"},
#@   "cam3": {"ip": "192.168.0.203", "label": "Camera 3"},
#@ }

#@ cam_list = []
#@ for cam_id in sorted(cams.keys()):
#@   cam_list.append({"id": cam_id, "label": cams[cam_id]["label"]})
#@ end

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: #@ name + "-cameras"
data:
  cameras.json: #@ json.encode({"cameras": cam_list})

#@ for cam_id in sorted(cams.keys()):
#@ cam_name = name + "-" + cam_id
#@ for/end route_doc in route.default(cam_name):
--- #@ route_doc
---
apiVersion: v1
kind: Service
metadata:
  name: #@ cam_name
spec:
  ports:
    - name: http
      port: 80
      targetPort: 8889
---
apiVersion: v1
kind: Endpoints
metadata:
  name: #@ cam_name
subsets:
  - addresses:
      - ip: #@ cams[cam_id]["ip"]
    ports:
      - port: 8889
        name: http
#@ end
