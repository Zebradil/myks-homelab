#@ load("@ytt:data", "data")
#@ load("secrets.star", "sops")

#@ a = data.values.application
#@ s = a.secretName
---
apiVersion: v1
kind: Secret
metadata:
  name: #@ s
type: Opaque
stringData:
  #! Location is private; values live encrypted in static/<secretName>.sops.yaml
  #! and are resolved by the argocd vals plugin at sync time. Keys are named
  #! after the env vars the exporter reads (consumed via envFrom).
  OUTDOOR_LATITUDE: #@ sops(s, "OUTDOOR_LATITUDE")
  OUTDOOR_LONGITUDE: #@ sops(s, "OUTDOOR_LONGITUDE")
  OUTDOOR_LOCATION: #@ sops(s, "OUTDOOR_LOCATION")
  OUTDOOR_UBA_STATION: #@ sops(s, "OUTDOOR_UBA_STATION")
  OUTDOOR_UBA_STATION_CODE: #@ sops(s, "OUTDOOR_UBA_STATION_CODE")
