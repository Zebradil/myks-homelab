#@ load("@ytt:data", "data")
---
image:
  tag: #@ data.values.application.version

providers:
  kubernetesCRD:
    allowCrossNamespace: true

hostNetwork: true
deployment:
  dnsPolicy: ClusterFirstWithHostNet
  kind: DaemonSet

ports:
  metrics:
    #! When using hostNetwork, use another port to avoid conflict with node exporter:
    #! https://github.com/prometheus/prometheus/wiki/Default-port-allocations
    port: 19100
  web:
    port: 80
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
  websecure:
    port: 443

service:
  enabled: false

ingressRoute:
  dashboard:
    enabled: false

affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values: #@ data.values.environment.edgeNodes

updateStrategy:
  rollingUpdate:
    maxSurge: 0
    maxUnavailable: 1

securityContext:
  capabilities:
    drop: [ALL]
    add: [NET_BIND_SERVICE]
  runAsNonRoot: false
  runAsUser: 0

additionalArguments:
  -  #@ "--providers.kubernetesingress.ingressendpoint.hostname=" + data.values.application.ingress.hostname

log:
  level: DEBUG
accessLog:
  enabled: true

global:
  checkNewVersion: false
  sendAnonymousUsage: false
