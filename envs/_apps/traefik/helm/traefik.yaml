#! When Traefik is configured to use the host network, it binds all andpoints
#! to all interfaces by default. This is a security risk, as it exposes the
#! internal services to the public internet. To avoid this, we bind the
#! internal services to a non-public interface.
#! We can't use localhost for this purpose, because it is not available for
#! other containers (such as metric scrapers) that are not using the host
#! network. Instead, on every node in /etc/hosts, we define a custom hostname
#! resolving to the node's IP address of the interface of our choice. Example:
#!
#!    echo 'node.k8s.lan	192.168.69.69' | sudo tee -a /etc/hosts

#@ load("@ytt:data", "data")
#@ load("@ytt:overlay", "overlay")
#@ load("/cloudflare.lib.yaml", "get_ipsv6")

#@ node_lan_host = "node.k8s.lan"
#@ node_vpn_host = "node.k8s.vpn"
---
ports:
  traefik:
    hostIP: #@ node_lan_host
  metrics:
    hostIP: #@ node_lan_host
  paperless-sftp:
    port: 2222
    hostIP: #@ node_lan_host
  web:
    hostIP: '[$NODE_IPV6]'
    forwardedHeaders:
      trustedIPs: #@ get_ipsv6()
  websecure:
    hostIP: '[$NODE_IPV6]'
    forwardedHeaders:
      trustedIPs: #@ get_ipsv6()
  #! Dedicated ports for connection from the LAN network.
  lan-web:
    port: 80
    hostIP: #@ node_lan_host
    http:
      redirections:
        entryPoint:
          to: lan-websecure
          scheme: https
          permanent: true
  lan-websecure:
    port: 443
    exposedPort: 443
    hostIP: #@ node_lan_host
    http:
      tls:
        enabled: true
  #! Dedicated ports for connection from the VPN network.
  vpn-web:
    port: 80
    hostIP: #@ node_vpn_host
    http:
      redirections:
        entryPoint:
          to: vpn-websecure
          scheme: https
          permanent: true
  vpn-websecure:
    port: 443
    exposedPort: 443
    hostIP: #@ node_vpn_host
    http:
      tls:
        enabled: true


#@overlay/match by=overlay.all, expects="1+"
#@ if/end data.values.application.allowOnlyCloudflareIPs:
---
#! Enforce "must come through Cloudflare" on the public entrypoints only. The
#! lan-*/vpn-* entrypoints are internal and intentionally left open.
#@overlay/match when="1+"
additionalArguments:
  - --entryPoints.web.http.middlewares=traefik-cloudflare-only@kubernetescrd
  - --entryPoints.websecure.http.middlewares=traefik-cloudflare-only@kubernetescrd
