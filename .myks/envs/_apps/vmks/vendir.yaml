apiVersion: vendir.k14s.io/v1alpha1
kind: Config
directories:
- path: charts/vmks
  contents:
  - path: .
    lazy: true
    helmChart:
      name: victoria-metrics-k8s-stack
      version: 0.67.0
      repository:
        url: oci://ghcr.io/victoriametrics/helm-charts
- path: charts/prom-crds
  contents:
  - path: .
    lazy: true
    helmChart:
      name: prometheus-operator-crds
      version: 30.0.1
      repository:
        url: https://prometheus-community.github.io/helm-charts
- path: ytt/pvc-dashboard
  contents:
  - path: .
    lazy: true
    git:
      url: https://github.com/dfds/ded-grafana-dashboards
      ref: 721ee4069aab28c533babf63f1c21051924f2f33
    includePaths:
    - kubernetes-persistent-volumes.json
